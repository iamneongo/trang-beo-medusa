services:
  - type: web
    name: trang-beo-medusa
    runtime: node
    plan: free
    region: singapore
    rootDir: apps/backend
    autoDeployTrigger: commit
    healthCheckPath: /health
    buildCommand: npm install --legacy-peer-deps && npm run build:render
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: STORE_CORS
        value: http://localhost:8000,http://localhost:8081,http://localhost:19006,http://192.168.110.202:8081,http://192.168.110.202:19006,exp://192.168.110.202:8081
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: MEDUSA_WORKER_MODE
        value: shared
      - key: MEDUSA_ADMIN_ONBOARDING_TYPE
        value: default
